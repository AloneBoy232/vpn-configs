name: Test VPN Configs
on:
  push:
    paths:
      - 'raw.txt'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v3

      - name: Download Xray
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip xray
          chmod +x xray
          echo "Xray ready: $(./xray version | head -1)"

      - name: Install deps
        run: pip install -q requests 2>/dev/null || true

      - name: Test configs with Xray + GeoIP
        run: |
          python3 << 'PYEOF'
          import socket, base64, json, subprocess, time, os, tempfile
          from urllib.parse import urlparse
          from concurrent.futures import ThreadPoolExecutor, as_completed

          FLAGS = {
            "IR":"🇮🇷","US":"🇺🇸","DE":"🇩🇪","FR":"🇫🇷","GB":"🇬🇧","NL":"🇳🇱",
            "SE":"🇸🇪","NO":"🇳🇴","FI":"🇫🇮","CH":"🇨🇭","CA":"🇨🇦","AU":"🇦🇺",
            "JP":"🇯🇵","KR":"🇰🇷","SG":"🇸🇬","HK":"🇭🇰","TW":"🇹🇼","RU":"🇷🇺",
            "PL":"🇵🇱","CZ":"🇨🇿","AT":"🇦🇹","ES":"🇪🇸","IT":"🇮🇹","TR":"🇹🇷",
            "IN":"🇮🇳","BR":"🇧🇷","UA":"🇺🇦","RO":"🇷🇴","CN":"🇨🇳","AE":"🇦🇪",
            "ID":"🇮🇩","MY":"🇲🇾","TH":"🇹🇭","VN":"🇻🇳","PH":"🇵🇭","MX":"🇲🇽",
            "BG":"🇧🇬","GR":"🇬🇷","HU":"🇭🇺","RS":"🇷🇸","SK":"🇸🇰",
          }

          geo_cache = {}
          geo_lock = __import__("threading").Lock()

          def resolve_host(host):
            try:
              return socket.gethostbyname(host)
            except:
              return host

          def get_geoip(ip):
            with geo_lock:
              if ip in geo_cache:
                return geo_cache[ip]
            try:
              import urllib.request
              time.sleep(0.5)
              url = f"http://ip-api.com/json/{ip}?fields=countryCode,city"
              req = urllib.request.urlopen(url, timeout=6)
              data = json.loads(req.read())
              code = data.get("countryCode", "XX")
              city = data.get("city", "")
              with geo_lock:
                geo_cache[ip] = (code, city)
              return code, city
            except:
              with geo_lock:
                geo_cache[ip] = ("XX", "")
              return "XX", ""

          def find_free_port():
            with socket.socket() as s:
              s.bind(('', 0))
              return s.getsockname()[1]

          def parse_config(cfg):
            try:
              if cfg.startswith("vmess://"):
                b64 = cfg[8:].split("#")[0]
                padded = b64 + "=" * (-len(b64) % 4)
                data = json.loads(base64.b64decode(padded).decode())
                return "vmess", data
              elif cfg.startswith("vless://"):
                u = urlparse(cfg)
                params = dict(p.split("=",1) for p in u.query.split("&") if "=" in p)
                return "vless", {"host": u.hostname, "port": u.port or 443,
                                  "id": u.username, "params": params, "path": u.path}
              elif cfg.startswith("trojan://"):
                u = urlparse(cfg)
                params = dict(p.split("=",1) for p in u.query.split("&") if "=" in p)
                return "trojan", {"host": u.hostname, "port": u.port or 443,
                                   "password": u.username, "params": params, "path": u.path}
              elif cfg.startswith("ss://"):
                u = urlparse(cfg)
                return "ss", {"host": u.hostname, "port": u.port or 443,
                               "userinfo": u.username}
            except:
              pass
            return None, None

          def build_xray_config(proto, data, socks_port):
            if proto == "vmess":
              outbound = {
                "protocol": "vmess",
                "settings": {"vnext": [{
                  "address": data.get("add",""),
                  "port": int(data.get("port", 443)),
                  "users": [{"id": data.get("id",""), "alterId": int(data.get("aid",0))}]
                }]},
                "streamSettings": {
                  "network": data.get("net","tcp"),
                  "security": data.get("tls",""),
                  "wsSettings": {"path": data.get("path","/"), "headers": {"Host": data.get("host","")}},
                  "tlsSettings": {"serverName": data.get("sni", data.get("host",""))},
                }
              }
              host_for_country = data.get("add","")
            elif proto == "vless":
              params = data.get("params", {})
              stream = {"network": params.get("type","tcp"), "security": params.get("security","")}
              if params.get("type") == "ws":
                stream["wsSettings"] = {
                  "path": params.get("path", data.get("path","/")),
                  "headers": {"Host": params.get("host", data["host"])}
                }
              if params.get("security") in ("tls","reality"):
                stream["tlsSettings"] = {"serverName": params.get("sni", data["host"])}
              if params.get("security") == "reality":
                stream["realitySettings"] = {
                  "serverName": params.get("sni",""),
                  "fingerprint": params.get("fp","chrome"),
                  "publicKey": params.get("pbk",""),
                  "shortId": params.get("sid",""),
                }
              outbound = {
                "protocol": "vless",
                "settings": {"vnext": [{"address": data["host"], "port": data["port"],
                  "users": [{"id": data["id"], "encryption": "none"}]}]},
                "streamSettings": stream
              }
              host_for_country = data["host"]
            elif proto == "trojan":
              params = data.get("params", {})
              stream = {"network": params.get("type","tcp"), "security": "tls"}
              if params.get("type") == "ws":
                stream["wsSettings"] = {
                  "path": params.get("path", data.get("path","/")),
                  "headers": {"Host": params.get("host", data["host"])}
                }
              stream["tlsSettings"] = {"serverName": params.get("sni", data["host"])}
              outbound = {
                "protocol": "trojan",
                "settings": {"servers": [{"address": data["host"], "port": data["port"],
                  "password": data["password"]}]},
                "streamSettings": stream
              }
              host_for_country = data["host"]
            elif proto == "ss":
              try:
                userinfo = data["userinfo"]
                padded = userinfo + "=" * (-len(userinfo) % 4)
                decoded = base64.b64decode(padded).decode()
                method, password = decoded.split(":", 1)
              except:
                return None, None
              outbound = {
                "protocol": "shadowsocks",
                "settings": {"servers": [{"address": data["host"], "port": data["port"],
                  "method": method, "password": password}]}
              }
              host_for_country = data["host"]
            else:
              return None, None

            config = {
              "log": {"loglevel": "none"},
              "inbounds": [{"port": socks_port, "protocol": "socks",
                "settings": {"auth": "noauth", "udp": False}}],
              "outbounds": [outbound, {"protocol": "freedom", "tag": "direct"}]
            }
            return config, host_for_country

          def test_with_xray(cfg, index):
            proto, data = parse_config(cfg)
            if not proto:
              return index, cfg, None, None, None, None, "parse_error"

            socks_port = find_free_port()
            xray_cfg, host = build_xray_config(proto, data, socks_port)
            if not xray_cfg:
              return index, cfg, None, None, None, None, "build_error"

            with tempfile.NamedTemporaryFile(mode='w', suffix='.json', delete=False) as f:
              json.dump(xray_cfg, f)
              cfg_path = f.name

            proc = None
            try:
              proc = subprocess.Popen(
                ["./xray", "run", "-c", cfg_path],
                stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL
              )
              time.sleep(1.5)

              result = subprocess.run(
                ["curl", "-s", "--socks5-hostname", f"127.0.0.1:{socks_port}",
                 "--max-time", "8", "-o", "/dev/null",
                 "-w", "%{http_code} %{time_total}",
                 "http://cp.cloudflare.com/"],
                capture_output=True, text=True, timeout=12
              )
              parts = result.stdout.strip().split()
              code = parts[0] if parts else ""
              ping_ms = int(float(parts[1]) * 1000) if len(parts) > 1 else 0
              ok = code in ("200", "204")

              if ok:
                ip = resolve_host(host)
                country, city = get_geoip(ip)
                return index, cfg, host, country, city, ping_ms, f"http_{code}"
              else:
                return index, cfg, None, None, None, None, f"http_{code}"

            except subprocess.TimeoutExpired:
              return index, cfg, None, None, None, None, "timeout"
            except Exception as e:
              return index, cfg, None, None, None, None, str(e)
            finally:
              if proc:
                proc.terminate()
                try: proc.wait(timeout=2)
                except: proc.kill()
              try: os.unlink(cfg_path)
              except: pass

          with open("raw.txt") as f:
            configs = [l.strip() for l in f if l.strip()]

          seen = set()
          unique = []
          for cfg in configs:
            key = cfg.split("#")[0]
            if key not in seen:
              seen.add(key)
              unique.append(cfg)
          configs = unique
          print(f"Testing {len(configs)} unique configs (25 threads)...")

          results = {}
          with ThreadPoolExecutor(max_workers=25) as ex:
            futures = {ex.submit(test_with_xray, cfg, i): i for i, cfg in enumerate(configs)}
            for fut in as_completed(futures):
              i, cfg, host, country, city, ping_ms, reason = fut.result()
              results[i] = (cfg, host, country, city, ping_ms, reason)
              done = len(results)
              if host:
                flag = FLAGS.get(country, "🌍")
                print(f"[{done}/{len(configs)}] ✅ {host} → {flag} {country} {city} | ⚡{ping_ms}ms")
              else:
                print(f"[{done}/{len(configs)}] ❌ {reason}")

          valid = []
          for i in sorted(results):
            cfg, host, country, city, ping_ms, reason = results[i]
            if host:
              flag = FLAGS.get(country, "🌍")
              base = cfg.split("#")[0]
              valid.append(f"{base}#{flag} | ⚡{ping_ms}ms | @AmConfigGrabber")

          print(f"\n✅ Valid: {len(valid)}/{len(configs)}")

          with open("configs.txt","w") as f:
            f.write("\n".join(valid))

          print(f"📝 Saved {len(valid)} configs to configs.txt")
          PYEOF

      - name: Send configs to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          python3 << 'PYEOF'
          import os, time, json, urllib.request, urllib.error

          TOKEN = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          CHAT_ID = os.environ.get("TELEGRAM_CHANNEL_ID", "")

          if not TOKEN or not CHAT_ID:
            print("⚠️ TELEGRAM_BOT_TOKEN یا TELEGRAM_CHANNEL_ID ست نشده — رد شد")
            raise SystemExit(0)

          if not os.path.exists("configs.txt"):
            print("فایل configs.txt پیدا نشد")
            raise SystemExit(0)

          with open("configs.txt") as f:
            configs = [l.strip() for l in f if l.strip()]

          if not configs:
            print("هیچ کانفیگ معتبری برای ارسال نیست")
            raise SystemExit(0)

          print(f"📤 Sending {len(configs)} configs to Telegram...")

          def escape_html(s):
            return s.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;")

          def send_message(text):
            url = f"https://api.telegram.org/bot{TOKEN}/sendMessage"
            payload = json.dumps({
              "chat_id": CHAT_ID,
              "text": text,
              "parse_mode": "HTML",
              "disable_web_page_preview": True,
            }).encode()
            req = urllib.request.Request(url, data=payload, headers={"Content-Type": "application/json"})
            try:
              urllib.request.urlopen(req, timeout=10)
              return True
            except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"❌ HTTP error: {e.code} - {body}")
              return False
            except Exception as e:
              print(f"❌ Error: {e}")
              return False

          sent = 0
          for line in configs:
            parts = line.split("#", 1)
            cfg = parts[0]
            label = parts[1] if len(parts) > 1 else ""
            text = f"<code>{escape_html(line)}</code>"
            if label:
              text += f"\n🏷 {escape_html(label)}"
            if send_message(text):
              sent += 1
              print(f"[{sent}/{len(configs)}] ✅ sent")
            else:
              print(f"[{sent}/{len(configs)}] ❌ failed")
            time.sleep(1.2)

          print(f"\n✅ Sent {sent}/{len(configs)} configs to Telegram")
          PYEOF

            - name: Commit & Push results
        run: |
          git config user.name "VPN Bot"
          git config user.email "bot@github.com"
          
          git add configs.txt
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "✅ $(wc -l < configs.txt) valid configs"
          
          git pull --rebase origin main || echo "Pull failed"
          git push || git push --force-with-lease
